sonar.organization=<your_org_slug>          # REQUIRED on SonarCloud
sonar.projectKey=<your_org_slug>_mini-exam-service  # match SonarCloud exactly
sonar.projectName=mini-exam-service
sonar.sourceEncoding=UTF-8
sonar.sources=.
sonar.exclusions=coverage/**,reports/**,**/*.test.js,**/__tests__/**,node_modules/**
sonar.tests=__tests__
sonar.test.inclusions=**/*.test.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
